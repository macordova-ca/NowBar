name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build universal release binary (x86_64 + arm64)
        env:
          MACOSX_DEPLOYMENT_TARGET: "14.0"
        run: |
          swift build -c release --arch x86_64 --arch arm64
          BIN=".build/apple/Products/Release/NowBar"
          if [ ! -f "$BIN" ]; then BIN=".build/release/NowBar"; fi
          file "$BIN"

      - name: Package .app bundle
        run: |
          APP="NowBar.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          BIN=".build/apple/Products/Release/NowBar"
          if [ ! -f "$BIN" ]; then BIN=".build/release/NowBar"; fi
          cp "$BIN" "$APP/Contents/MacOS/NowBar"
          cp Info.plist "$APP/Contents/Info.plist"
          cp nowbar-icon.icns "$APP/Contents/Resources/nowbar-icon.icns"
          xattr -cr "$APP"
          codesign --force --deep --sign - "$APP"
          file "$APP/Contents/MacOS/NowBar"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build DMG
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          DMG="NowBar.dmg"
          rm -f "$DMG"
          create-dmg \
            --volname "NowBar ${VERSION}" \
            --volicon "nowbar-icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 110 \
            --icon "NowBar.app" 160 190 \
            --hide-extension "NowBar.app" \
            --app-drop-link 440 190 \
            "$DMG" \
            "NowBar.app"
          echo "DMG=$DMG" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NowBar-dmg
          path: ${{ env.DMG }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG }}
          generate_release_notes: true
          body: |
            ## Instalación

            1. Descarga **NowBar.dmg** (abajo)
            2. Ábrelo y arrastra **NowBar** a la carpeta **Applications**
            3. Abrir la app la primera vez (elige una opción):
               - **Opción A** — Finder → `Applications` → click derecho sobre **NowBar** → **Abrir** → confirma en el diálogo
               - **Opción B** — si dice "dañado" o "no se puede abrir", ejecuta en Terminal:
                 ```bash
                 xattr -dr com.apple.quarantine /Applications/NowBar.app
                 open /Applications/NowBar.app
                 ```
               - **Opción C** — Ajustes del Sistema → Privacidad y Seguridad → busca "NowBar fue bloqueado" → **Abrir de todos modos**
            4. El wizard interno te guía para habilitar los navegadores

            El binario es universal (Intel + Apple Silicon). La firma es ad-hoc (sin Apple Developer ID), por eso macOS pide confirmación la primera vez.

            Ver [README](../blob/main/README.md) para detalles.
